services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8502:8501"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - BIFROST_URL=http://host.docker.internal:24242/v1
    volumes:
      - ./app:/app/app
      - ./eval:/app/eval
      - ./config.yaml:/app/config.yaml
      - audit_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  audit_data:
