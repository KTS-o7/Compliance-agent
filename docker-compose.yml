services:
  bifrost:
    image: maximhq/bifrost:latest
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost:/app/data
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8502:8501"
    depends_on:
      qdrant:
        condition: service_healthy
      bifrost:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - BIFROST_URL=http://bifrost:8080/v1
      - PYTHONPATH=/app
      - TRANSFORMERS_NO_ADVISORY_WARNINGS=1
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      - TOKENIZERS_PARALLELISM=false
      - TRANSFORMERS_VERBOSITY=error
      - HF_TOKEN=${HF_TOKEN}
      - USE_STRUCTURED_OUTPUT=${USE_STRUCTURED_OUTPUT:-true}
    volumes:
      - ./app:/app/app
      - ./eval:/app/eval
      - ./config.yaml:/app/config.yaml
      - ./.streamlit:/app/.streamlit
      - audit_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  audit_data:
